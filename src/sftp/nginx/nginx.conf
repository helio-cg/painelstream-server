events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;

    server {
        listen 80;

        location / {
            proxy_pass http://sftpgo:8080;
        }

        include /etc/nginx/includes/radios/*.conf;
        include /etc/nginx/includes/*.conf;
    }
}