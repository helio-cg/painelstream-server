services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "2086:2086"
      - "2087:2087" # Porta para o console de administração
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":2087"
    volumes:
      - /storage:/data

  app:
    build: .
    container_name: node_app
    ports:
      - "3000:3000"
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 2086
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET: music-bucket

volumes:
  minio_data: